workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: CrimeGameAPI

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pocketcase.app
      vars:
        XCODE_PROJECT: "ios_build/Unity-iPhone.xcodeproj"
        XCODE_SCHEME: "Unity-iPhone"
        BUNDLE_ID: "com.pocketcase.app"

    scripts:
      - name: Set build number
        script: |
          cd ios_build
          agvtool new-version -all $PROJECT_BUILD_NUMBER

      - name: Build Xcode archive
        script: |
          set -o pipefail
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "/tmp/PocketCasebook.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="PocketCasebook_Prov" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER="com.pocketcase.app"

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "/tmp/PocketCasebook.xcarchive" \
            -exportPath "/tmp/ipa" \
            -exportOptionsPlist "ExportOptions.plist"

    artifacts:
      - /tmp/ipa/*.ipa
      - /tmp/PocketCasebook.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
